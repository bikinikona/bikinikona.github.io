  <h1>2026-2027 指名馬一覧</h1>
  <div id="table-container">読み込み中...</div>

  <script>
    async function loadCSV() {
      const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vSaLvOcmHtlpogDiYQtvcGQD15vhTxms_YVyBK2nFs7JKBYhVVOqdyD8bEG9TfGaoB_ROitY7CnOP_h/pub?gid=678170996&single=true&output=csv');
      const csvText = await response.text();

      const parseCSV = (text) => {
        const rows = [];
        let inQuotes = false, row = [], field = '';
        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const next = text[i + 1];

          if (char === '"') {
            if (inQuotes && next === '"') {
              field += '"';
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === ',' && !inQuotes) {
            row.push(field);
            field = '';
          } else if ((char === '\n' || char === '\r') && !inQuotes) {
            if (field !== '' || row.length > 0) {
              row.push(field);
              rows.push(row);
              row = [];
              field = '';
            }
            if (char === '\r' && next === '\n') i++; // skip LF in CRLF
          } else {
            field += char;
          }
        }
        if (field !== '' || row.length > 0) {
          row.push(field);
          rows.push(row);
        }
        return rows;
      };

      const rows = parseCSV(csvText);
      const headers = rows[0];
      const data = rows.slice(1);

      const grouped = {};
      data.forEach(row => {
        const member = row[0];
        const horse = row[1];
        const sire = row[2];
        const dam = row[3];
        const record = row[5];
        const point = row[6];
        const link = row[7];
        const gender = row[8];

        if (!grouped[member]) grouped[member] = [];
        grouped[member].push({ horse, sire, dam, record, point, link, gender });
      });

      
      const memberTotals = {};
      for (const member in grouped) {
        let total = 0;
        grouped[member].forEach(entry => {
          const pt = parseInt(entry.point.replace(/[, ptPTｐｔ]/g, '')) || 0;
          total += pt;
        });
        memberTotals[member] = total;
      }

let html = "";
      for (const member in grouped) {
        html += `<h2>${member}<span class="point-badge">合計: ${memberTotals[member].toLocaleString()}pt</span></h2>`;
        html += "<table class='fancy-table'><thead><tr><th>馬名</th><th>父名</th><th>母名</th><th>成績</th><th>ポイント</th></tr></thead><tbody>";
        grouped[member].forEach(entry => {
          let colorStyle = "";
          if (entry.gender === "牡") colorStyle = "color: blue;";
          else if (entry.gender === "牝") colorStyle = "color: red;";
          else if (entry.gender === "セ") colorStyle = "color: purple;";

          html += `<tr style='${colorStyle}'>`;
          html += `<td class='left horse-name'><a href="${entry.link}">${entry.horse}</a></td>`;
          html += `<td class='left'>${entry.sire}</td>`;
          html += `<td class='left'>${entry.dam}</td>`;
          html += `<td class='left'>${entry.record}</td>`;
          html += `<td class='right'>${entry.point}</td>`;
          html += "</tr>";
        });
        html += "</tbody></table>";
      }

      document.getElementById("table-container").innerHTML = html;
    }

    loadCSV();
  </script>

<h2>馬ポイントランキング（上位20頭）</h2>
<div id="ranking-table" class="fancy-table">読み込み中...</div>

<script>
async function loadSummaryCSV(url, targetId) {
  const res = await fetch(url);
  const text = await res.text();

  const parseCSV = (csv) => {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < csv.length; i++) {
      const char = csv[i];
      const next = csv[i + 1];

      if (char === '"') {
        if (inQuotes && next === '"') {
          field += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (char === ',' && !inQuotes) {
        row.push(field.trim());
        field = '';
      } else if ((char === '\n' || char === '\r') && !inQuotes) {
        if (field !== '' || row.length > 0) {
          row.push(field.trim());
          rows.push(row);
          row = [];
          field = '';
        }
        if (char === '\r' && next === '\n') i++;
      } else {
        field += char;
      }
    }
    if (field !== '' || row.length > 0) {
      row.push(field.trim());
      rows.push(row);
    }
    return rows;
  };

  const rows = parseCSV(text);
  const headers = rows[0] || [];
  let data = rows.slice(1).filter(row => row.some(cell => cell !== ''));

  const normalize = (value) => String(value || '').replace(/\s/g, '').toLowerCase();
  const findIndex = (...patterns) => {
    return headers.findIndex(header => {
      const h = normalize(header);
      return patterns.some(pattern => pattern.test(h));
    });
  };

  const nameIdx = findIndex(/名前/, /指名者/, /メンバー/, /所属/);
  const pointIdx = findIndex(/ポイント合計/, /合計ポイント/, /総ポイント/, /合計/, /point/, /pt/);
  const firstIdx = findIndex(/1着/, /１着/, /一着/);
  const secondIdx = findIndex(/2着/, /２着/, /二着/);
  const thirdIdx = findIndex(/3着/, /３着/, /三着/);
  const otherIdx = findIndex(/着外/, /4着/, /４着/, /以下/);
  const startsIdx = findIndex(/出走数/, /出走/);
  const winRateIdx = findIndex(/勝率/);

  const getCell = (row, idx, fallback = '') => idx >= 0 ? (row[idx] || fallback) : fallback;
  const getNumber = (value) => parseInt(String(value || '').replace(/[^\d-]/g, '')) || 0;
  const pointSortIdx = pointIdx >= 0 ? pointIdx : headers.length - 1;

  data.sort((a, b) => getNumber(getCell(b, pointSortIdx)) - getNumber(getCell(a, pointSortIdx)));

  let html = "<div class='table-scroll'><table class='fancy-table summary-stats'><thead><tr>";
  html += `<th>順位</th>`;
  html += `<th>名前</th>`;
  html += `<th>ポイント合計</th>`;
  html += `<th>成績</th>`;
  html += `<th>出走数</th>`;
  html += `<th>勝率</th>`;
  html += "</tr></thead><tbody>";

  data.forEach((row, i) => {
    const name = getCell(row, nameIdx);
    const point = getCell(row, pointIdx >= 0 ? pointIdx : pointSortIdx);
    const record = [
      getCell(row, firstIdx, '0'),
      getCell(row, secondIdx, '0'),
      getCell(row, thirdIdx, '0'),
      getCell(row, otherIdx, '0')
    ].map(v => getNumber(v)).join('-');
    const starts = getCell(row, startsIdx);
    const winRate = getCell(row, winRateIdx);

    html += "<tr>";
    html += `<td>${i + 1}</td>`;
    html += `<td>${name}</td>`;
    html += `<td>${point}</td>`;
    html += `<td>${record}</td>`;
    html += `<td>${starts}</td>`;
    html += `<td>${winRate}</td>`;
    html += "</tr>";
  });

  html += "</tbody></table></div>";
  document.getElementById(targetId).innerHTML = html;
}

// 成績表
loadSummaryCSV(
  'https://docs.google.com/spreadsheets/d/e/2PACX-1vSaLvOcmHtlpogDiYQtvcGQD15vhTxms_YVyBK2nFs7JKBYhVVOqdyD8bEG9TfGaoB_ROitY7CnOP_h/pub?gid=168257426&single=true&output=csv',
  'summary-table'
);

// 馬ランキング
</script>


<script>
 async function loadRanking() {
  const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSaLvOcmHtlpogDiYQtvcGQD15vhTxms_YVyBK2nFs7JKBYhVVOqdyD8bEG9TfGaoB_ROitY7CnOP_h/pub?gid=1559290885&single=true&output=csv");
  const text = await res.text();
  const rows = text.trim().split("\n").map(row => row.split(","));

  const headers = rows[0];
  const data = rows.slice(1).map(row => ({
    member: row[0],
    horse: row[1],
    record: row[2],
    point: row[3],
    link: row[4],
    gender: row[5]
  }));

  const filtered = data.filter(d => parseInt(d.point.replace(/[^\d]/g, '')) > 0);
  const top20 = filtered.slice(0, 20);

  let html = "<table class='fancy-table'><thead><tr><th style='width: 20px; text-align: center;'>順位</th><th>所属</th><th>馬名</th><th>成績</th><th>ポイント</th></tr></thead><tbody>";
  top20.forEach((row, i) => {
    let gender = row.gender.trim();
    let color = "";
    if (gender === "牡") color = "color: blue;";
    else if (gender === "牝") color = "color: red;";
    else if (gender === "セ") color = "color: purple;";

    html += `<tr>`;
    html += `<td style="width: 20px; text-align: center;">${i + 1}</td>`;
    html += `<td class='left'>${row.member}</td>`;
    html += `<td class='left'><a href="${row.link}" style="${color}">${row.horse}</a></td>`;
    html += `<td class='left'>${row.record}</td>`;
    html += `<td class='right'>${row.point}</td>`;
    html += `</tr>`;
  });
  html += "</tbody></table>";
  document.getElementById("ranking-table").innerHTML = html;
  }

  loadRanking();
</script>
